<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Animations Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Animations Examples</h1>

    <!-- 1. Transition Example -->
    <section>
        <h2>1. Transition Animation</h2>
        <p>Hover over the box to see a smooth transition.</p>
        <div class="box transition-box"></div>
    </section>

    <!-- 2. Keyframe Animation -->
    <section>
        <h2>2. Keyframe Animation</h2>
        <p>This box moves continuously using keyframes.</p>
        <div class="box keyframe-box"></div>
    </section>

    <!-- 3. Bounce Animation -->
    <section>
        <h2>3. Bounce Animation</h2>
        <p>This box bounces up and down.</p>
        <div class="box bounce-box"></div>
    </section>

</body>
</html>
