<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Filters - Basic</title>
    <!-- Link external CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>CSS Filter Examples</h1>

    <!-- Original Image -->
    <div class="box">
        <h3>Original</h3>
        <img src="image.jpg" alt="Sample Image">
    </div>

    <!-- Grayscale -->
    <div class="box">
        <h3>Grayscale</h3>
        <img src="image.jpg" class="grayscale">
    </div>

    <!-- Sepia -->
    <div class="box">
        <h3>Sepia</h3>
        <img src="image.jpg" class="sepia">
    </div>

    <!-- Invert -->
    <div class="box">
        <h3>Invert</h3>
        <img src="image.jpg" class="invert">
    </div>

</body>

</html>
