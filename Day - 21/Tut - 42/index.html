<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters Demo</title>

    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>CSS Filter Effects Demo</h1>

    <!-- Original Image -->
    <div class="container">
        <h2>Original Image</h2>
        <img src="https://via.placeholder.com/300" alt="Sample Image">
    </div>

    <!-- Grayscale Filter -->
    <div class="container">
        <h2>Grayscale</h2>
        <img class="grayscale" src="https://via.placeholder.com/300" alt="Grayscale Image">
    </div>

    <!-- Blur Filter -->
    <div class="container">
        <h2>Blur</h2>
        <img class="blur" src="https://via.placeholder.com/300" alt="Blur Image">
    </div>

    <!-- Brightness Filter -->
    <div class="container">
        <h2>Brightness</h2>
        <img class="brightness" src="https://via.placeholder.com/300" alt="Bright Image">
    </div>

    <!-- Contrast Filter -->
    <div class="container">
        <h2>Contrast</h2>
        <img class="contrast" src="https://via.placeholder.com/300" alt="Contrast Image">
    </div>

    <!-- Sepia Filter -->
    <div class="container">
        <h2>Sepia</h2>
        <img class="sepia" src="https://via.placeholder.com/300" alt="Sepia Image">
    </div>

    <!-- Multiple Filters Combined -->
    <div class="container">
        <h2>Combined Filters</h2>
        <img class="combined" src="https://via.placeholder.com/300" alt="Combined Filters">
    </div>

</body>
</html>
